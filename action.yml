name: 'Lint i18n'
description: 'Lint flat-key i18n JSON files for namespace conflicts and invalid value types'
branding:
  icon: 'database'
  color: 'green'
inputs:
  path:
    description: 'Path to the i18n directory containing locale JSON files'
    required: true
outputs:
  total-files-analyzed:
    description: 'Total JSON files found (including skipped files)'
runs:
  using: 'node20'
  main: 'dist/index.js'
